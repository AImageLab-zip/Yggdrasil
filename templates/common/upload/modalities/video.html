<div class="mb-4" id="video-upload-section">
	<h6 class="mb-2"><i class="fas fa-video me-2"></i>{{ patient_upload_form.video.label }}</h6>
	<div class="mb-3">
		<label for="{{ patient_upload_form.video.id_for_label }}" class="form-label">{{ patient_upload_form.video.label }}</label>
		{{ patient_upload_form.video }}
		{% if patient_upload_form.video.errors %}
			<div class="text-danger">{{ patient_upload_form.video.errors }}</div>
		{% endif %}
		<div class="form-text">Upload a surgical video (MP4, AVI formats)</div>
	</div>

	<div id="video-upload-progress" class="d-none mt-2">
		<div class="d-flex justify-content-between mb-1">
			<small class="text-muted"><i class="fas fa-spinner fa-spin me-1"></i>Uploading video…</small>
			<small id="video-upload-percent" class="text-muted">0%</small>
		</div>
		<div class="progress" style="height: 8px;">
			<div id="video-progress-bar"
				 class="progress-bar progress-bar-striped progress-bar-animated"
				 role="progressbar"
				 style="width: 0%"
				 aria-valuenow="0"
				 aria-valuemin="0"
				 aria-valuemax="100"></div>
		</div>
	</div>
</div>

<script>
(function () {
	var form = document.querySelector('form[enctype="multipart/form-data"]');
	if (!form) return;

	form.addEventListener('submit', function (e) {
		var videoInput = form.querySelector('input[name="video"]');
		if (!videoInput || !videoInput.files || !videoInput.files.length) return;

		e.preventDefault();

		var progressSection = document.getElementById('video-upload-progress');
		var progressBar     = document.getElementById('video-progress-bar');
		var progressPct     = document.getElementById('video-upload-percent');
		var submitBtn       = form.querySelector('[type="submit"]');

		progressSection.classList.remove('d-none');
		if (submitBtn) {
			submitBtn.disabled = true;
			submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Uploading…';
		}

		var xhr = new XMLHttpRequest();

		xhr.upload.addEventListener('progress', function (ev) {
			if (!ev.lengthComputable) return;
			var pct = Math.round((ev.loaded / ev.total) * 100);
			progressBar.style.width     = pct + '%';
			progressBar.setAttribute('aria-valuenow', pct);
			progressPct.textContent     = pct + '%';
		});

		xhr.addEventListener('load', function () {
			var data = null;
			try { data = JSON.parse(xhr.responseText); } catch (_) {}

			if (data && data.ok === true) {
				progressBar.style.width = '100%';
				progressBar.setAttribute('aria-valuenow', 100);
				progressPct.textContent = '100%';
				progressBar.classList.remove('progress-bar-animated');
				window.location.href = data.redirect;
			} else if (data && data.ok === false) {
				_videoUploadError(data.error || 'Upload failed. Please try again.');
			} else if (xhr.status >= 200 && xhr.status < 400) {
				/* Fallback: non-JSON 2xx/3xx — navigate to responseURL */
				progressBar.style.width = '100%';
				progressBar.classList.remove('progress-bar-animated');
				window.location.href = xhr.responseURL || window.location.href;
			} else {
				_videoUploadError('Upload failed (HTTP ' + xhr.status + '). Please try again.');
			}
		});

		xhr.addEventListener('error', function () {
			_videoUploadError('Network error during upload. Please check your connection and try again.');
		});

		xhr.addEventListener('abort', function () {
			_videoUploadError('Upload was cancelled.');
		});

		xhr.open('POST', form.action || window.location.href, true);
		xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');

		var fd = new FormData(form);
		xhr.send(fd);

		function _videoUploadError(msg) {
			progressSection.classList.add('d-none');
			if (submitBtn) {
				submitBtn.disabled = false;
				submitBtn.innerHTML = '<i class="fas fa-upload me-2"></i>Upload & Process';
			}
			if (window.appNotify) {
				window.appNotify(msg, 'danger');
			} else {
				alert(msg);
			}
		}
	});
}());
</script>
